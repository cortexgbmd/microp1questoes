<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Questoes - Microbiologia P1</title>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eeeeee;
  --text-muted: #a0a0b8;
  --success: #27ae60;
  --error: #e74c3c;
  --warning: #f39c12;
  --border: #2a2a4a;
}
.light-mode {
  --bg: #f0f0f5;
  --card: #ffffff;
  --accent: #d63851;
  --accent2: #1a5276;
  --text: #1a1a2e;
  --text-muted: #555577;
  --success: #1e8449;
  --error: #c0392b;
  --warning: #d68910;
  --border: #d0d0e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 16px;
  line-height: 1.7;
  transition: background .3s, color .3s;
}
.container { max-width: 800px; margin: 0 auto; padding: 16px; }
header {
  text-align: center;
  padding: 32px 16px 24px;
  border-bottom: 2px solid var(--accent);
  margin-bottom: 24px;
}
header h1 { font-size: 1.6rem; color: var(--accent); margin-bottom: 6px; }
header p { color: var(--text-muted); font-size: .92rem; }
.top-bar {
  display: flex; flex-wrap: wrap; gap: 10px;
  align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.top-bar .left { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: .88rem;
  font-weight: 600;
  transition: opacity .2s;
}
.btn:hover { opacity: .85; }
.btn.secondary { background: var(--accent2); }
.btn.sm { padding: 5px 12px; font-size: .82rem; }
.btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn.ghost.active { background: var(--accent); color: #fff; border-color: var(--accent); }
select {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: .88rem;
}
.stats-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex; flex-wrap: wrap; gap: 16px;
  font-size: .88rem;
}
.stats-bar .stat { display: flex; flex-direction: column; align-items: center; }
.stats-bar .stat .val { font-size: 1.3rem; font-weight: 700; }
.stats-bar .stat .lbl { color: var(--text-muted); font-size: .78rem; }
.stat .val.green { color: var(--success); }
.stat .val.red { color: var(--error); }
.stat .val.yellow { color: var(--warning); }
.question-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  margin-bottom: 18px;
  transition: border-color .3s;
}
.question-card.correct-border { border-color: var(--success); }
.question-card.wrong-border { border-color: var(--error); }
.q-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; flex-wrap: wrap; gap: 6px;
}
.q-num { font-weight: 700; color: var(--accent); font-size: 1rem; }
.q-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag {
  background: var(--accent2);
  color: #ddd;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: .72rem;
  font-weight: 600;
}
.tag.easy { background: #1e8449; }
.tag.medium { background: #d68910; }
.tag.hard { background: #c0392b; }
.q-stem { margin-bottom: 16px; }
.options { list-style: none; }
.options li {
  padding: 10px 14px;
  margin-bottom: 8px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  font-size: .94rem;
}
.options li:hover { border-color: var(--accent); }
.options li.selected { border-color: var(--accent); background: rgba(233,69,96,.1); }
.options li.correct-opt { border-color: var(--success); background: rgba(39,174,96,.15); }
.options li.wrong-opt { border-color: var(--error); background: rgba(231,76,60,.12); }
.options li.disabled { pointer-events: none; opacity: .85; }
.explanation {
  background: rgba(15,52,96,.25);
  border-left: 4px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 16px;
  margin-top: 14px;
  font-size: .9rem;
  line-height: 1.65;
  display: none;
}
.explanation.show { display: block; }
.explanation h4 { color: var(--accent); margin-bottom: 8px; }
.explanation p { margin-bottom: 6px; }
.explanation .exp-correct { color: var(--success); font-weight: 600; }
.explanation .exp-wrong { color: var(--error); }
.explanation .exp-topic { color: var(--text-muted); font-style: italic; margin-top: 8px; font-size: .82rem; }
.essay-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 22px;
  margin-bottom: 18px;
}
.essay-card .case { margin-bottom: 16px; }
.sub-q { margin-bottom: 14px; }
.sub-q .sub-label { font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.sub-q textarea {
  width: 100%;
  min-height: 80px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  font-family: inherit;
  font-size: .9rem;
  resize: vertical;
}
.essay-answer {
  background: rgba(15,52,96,.25);
  border-left: 4px solid var(--success);
  border-radius: 0 8px 8px 0;
  padding: 16px;
  margin-top: 10px;
  font-size: .9rem;
  display: none;
}
.essay-answer.show { display: block; }
.essay-answer h4 { color: var(--success); margin-bottom: 8px; }
.simulado-results {
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 24px;
  text-align: center;
  display: none;
}
.simulado-results h2 { color: var(--accent); margin-bottom: 16px; }
.score-big { font-size: 3rem; font-weight: 800; }
.score-big.good { color: var(--success); }
.score-big.ok { color: var(--warning); }
.score-big.bad { color: var(--error); }
.results-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
  gap: 10px; margin-top: 16px; text-align: left;
}
.results-grid .rg-item {
  background: var(--bg);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: .84rem;
}
.results-grid .rg-item .rg-label { color: var(--text-muted); }
.results-grid .rg-item .rg-val { font-weight: 700; font-size: 1.05rem; }
.diagnostico {
  background: var(--bg);
  border: 2px solid var(--warning);
  border-radius: 12px;
  padding: 22px;
  margin-top: 20px;
  text-align: left;
}
.diagnostico h3 { color: var(--warning); margin-bottom: 12px; font-size: 1.1rem; }
.diagnostico .diag-ok { color: var(--success); margin-bottom: 12px; font-size: .95rem; }
.diagnostico .diag-item {
  background: var(--card);
  border-left: 4px solid var(--error);
  border-radius: 6px;
  padding: 12px 16px;
  margin-bottom: 10px;
}
.diagnostico .diag-item.warn { border-left-color: var(--warning); }
.diagnostico .diag-item .diag-topic { font-weight: 700; font-size: .95rem; margin-bottom: 4px; }
.diagnostico .diag-item .diag-detail { color: var(--text-muted); font-size: .84rem; margin-bottom: 8px; }
.diagnostico .diag-item a {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  padding: 5px 14px;
  border-radius: 5px;
  text-decoration: none;
  font-size: .82rem;
  font-weight: 600;
}
.diagnostico .diag-item a:hover { opacity: .85; }
.toggle-theme {
  position: fixed; top: 12px; right: 12px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); width: 40px; height: 40px;
  border-radius: 50%; cursor: pointer; font-size: 1.2rem;
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.hidden { display: none !important; }
.section-title {
  font-size: 1.2rem; font-weight: 700; color: var(--accent);
  margin: 28px 0 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.nav-tabs {
  display: flex; gap: 0; margin-bottom: 20px;
  border-bottom: 2px solid var(--border);
}
.nav-tabs .tab {
  padding: 10px 20px;
  cursor: pointer;
  font-weight: 600;
  font-size: .92rem;
  color: var(--text-muted);
  border-bottom: 3px solid transparent;
  transition: all .2s;
}
.nav-tabs .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-tabs .tab:hover { color: var(--text); }
.progress-bar {
  width: 100%; height: 6px; background: var(--border);
  border-radius: 3px; margin-bottom: 16px; overflow: hidden;
}
.progress-bar .fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
@media (max-width: 600px) {
  .container { padding: 10px; }
  header h1 { font-size: 1.3rem; }
  .stats-bar { gap: 10px; }
  .top-bar { flex-direction: column; align-items: stretch; }
  .top-bar .left { justify-content: center; }
  .options li { padding: 8px 10px; font-size: .88rem; }
}
</style>
</head>
<body>
<button class="toggle-theme" onclick="toggleTheme()" title="Alternar tema">&#9681;</button>
<div class="container">
<header>
  <h1>Banco de Questoes -- Microbiologia P1</h1>
  <p>68 questoes objetivas + 12 questoes dissertativas | Todos os temas da prova</p>
</header>

<div class="nav-tabs">
  <div class="tab active" onclick="switchTab('objetivas')">Objetivas (68)</div>
  <div class="tab" onclick="switchTab('dissertativas')">Dissertativas (12)</div>
</div>

<div id="tab-objetivas">
  <div class="top-bar">
    <div class="left">
      <select id="filterTopic" onchange="applyFilters()">
        <option value="all">Todos os temas</option>
        <option value="fundamentos">Fundamentos/Classificacao</option>
        <option value="microbiota">Microbiota/Cultivo</option>
        <option value="infeccioso">Processo Infeccioso</option>
        <option value="toxinas">Exotoxinas/Endotoxinas</option>
        <option value="morfologia">Morfologia/Estrutura</option>
        <option value="virologia">Virologia/Patogenese</option>
        <option value="imunologia">Imunologia/Anticorpos</option>
        <option value="hipersensibilidade">Hipersensibilidades</option>
        <option value="micologia-geral">Micologia Geral</option>
        <option value="micologia-clinica">Micologia Clinica/Cryptococcus</option>
        <option value="ascomycota">Ascomycota (Candida e Aspergillus)</option>
      </select>
      <select id="filterDiff" onchange="applyFilters()">
        <option value="all">Todas as dificuldades</option>
        <option value="facil">Facil</option>
        <option value="medio">Medio</option>
        <option value="dificil">Dificil</option>
      </select>
    </div>
    <div>
      <button class="btn ghost" id="btnEstudo" onclick="setMode('estudo')">Modo Estudo</button>
      <button class="btn ghost active" id="btnSimulado" onclick="setMode('simulado')">Modo Simulado</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat"><span class="val" id="statTotal">0</span><span class="lbl">Questoes</span></div>
    <div class="stat"><span class="val green" id="statCorrect">0</span><span class="lbl">Acertos</span></div>
    <div class="stat"><span class="val red" id="statWrong">0</span><span class="lbl">Erros</span></div>
    <div class="stat"><span class="val yellow" id="statPending">0</span><span class="lbl">Pendentes</span></div>
    <div class="stat"><span class="val" id="statPct">0%</span><span class="lbl">Aproveitamento</span></div>
  </div>

  <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>

  <div id="simuladoResults" class="simulado-results">
    <h2>Resultado do Simulado</h2>
    <div class="score-big" id="scoreBig">0%</div>
    <p id="scoreText"></p>
    <div class="results-grid" id="resultsGrid"></div>
    <div id="diagnosticoPanel"></div>
    <br>
    <button class="btn" onclick="reviewSimulado()">Revisar Questoes</button>
    <button class="btn secondary" onclick="resetAll()">Reiniciar</button>
  </div>

  <div id="btnFinishWrap" class="hidden" style="text-align:center;margin-bottom:20px;">
    <button class="btn" onclick="finishSimulado()">Finalizar Simulado</button>
  </div>

  <div id="questionsContainer"></div>
</div>

<div id="tab-dissertativas" class="hidden">
  <div id="essayContainer"></div>
</div>

</div>

<script>
// =========================================================
// DATA
// =========================================================
const questions = [
// Q1 - fundamentos - facil - B
{
id:1, topic:"fundamentos", diff:"facil", answer:"B",
stem:"Um estudante de Medicina esta revisando os grandes grupos de micro-organismos para uma avaliacao. Ele precisa distinguir corretamente as caracteristicas fundamentais que separam procariontes de eucariontes na classificacao microbiologica.",
question:"Sobre a distincao entre celulas procariontes e eucariontes, assinale a alternativa correta.",
options:[
"A) Procariontes possuem nucleo desorganizado e ausencia completa de ribossomos, o que os diferencia dos eucariontes que apresentam nucleo com envoltorio e ribossomos funcionais associados ao reticulo endoplasmatico",
"B) Procariontes nao possuem envoltorio nuclear (carioteca) nem organelas membranosas, mas apresentam ribossomos funcionais, enquanto eucariontes possuem nucleo delimitado por membrana e organelas membranosas como mitocondrias",
"C) Eucariontes se distinguem dos procariontes exclusivamente pela presenca de material genetico circular e continuo, sendo que ambos os tipos celulares compartilham a mesma organizacao de organelas membranosas internas",
"D) Procariontes possuem envoltorio nuclear rudimentar e organelas membranosas simplificadas, o que representa uma etapa intermediaria de organizacao em direcao ao modelo eucariotico com nucleo verdadeiro presente",
"E) A principal diferenca entre procariontes e eucariontes reside no tamanho celular e na capacidade metabolica, sendo que procariontes medem nanometros e eucariontes medem micrometros em todas as situacoes"
],
explanation:{
correct:"B esta correta porque procariontes carecem de envoltorio nuclear e organelas membranosas, mas possuem ribossomos (70S). Eucariontes tem nucleo verdadeiro delimitado por carioteca e organelas como mitocondrias, RE e complexo de Golgi.",
wrongs:{
"A":"Incorreta: procariontes TEM ribossomos funcionais (70S) -- a afirmacao de ausencia de ribossomos e falsa.",
"C":"Incorreta: inverte o criterio -- o DNA circular e continuo e caracteristico de procariontes, nao de eucariontes. Alem disso, procariontes nao possuem organelas membranosas.",
"D":"Incorreta: procariontes NAO possuem envoltorio nuclear rudimentar -- eles simplesmente nao possuem envoltorio nuclear de forma alguma.",
"E":"Incorreta: bacterias (procariontes) medem micrometros (1-10 um), nao nanometros. Nanometros sao a escala dos virus."
},
topicRef:"Fundamentos -- Procarionte vs. Eucarionte"
}
},
// Q2 - fundamentos - medio - D
{
id:2, topic:"fundamentos", diff:"medio", answer:"D",
stem:"Na disciplina de Microbiologia, o professor apresenta o sistema de cinco reinos de Whittaker e discute a classificacao moderna dos micro-organismos, incluindo as subdivisoes da Microbiologia e a posicao de cada grupo na hierarquia taxonomica.",
question:"Considerando a classificacao dos seres vivos em cinco reinos (Whittaker) e as subdivisoes da Microbiologia moderna, assinale a alternativa correta.",
options:[
"A) O reino Fungi compreende organismos procariontes unicelulares com parede celular de celulose, sendo estudados pela Micologia como subdivisao da Parasitologia por manterem relacoes de parasitismo",
"B) A Microbiologia moderna inclui Bacteriologia, Micologia, Virologia e Parasitologia como suas quatro subdivisoes oficiais, uma vez que os parasitas possuem dimensoes microscopicas compativeis",
"C) O reino Monera agrupa eucariontes unicelulares como protozoarios e fungos leveduriformes, diferenciando-se do reino Protista pela ausencia de clorofila em seus representantes identificados",
"D) A Parasitologia foi retirada da Microbiologia na decada de 1950 porque as relacoes de parasitismo incluem helmintos macroscopicos, ficando a Microbiologia moderna composta por Bacteriologia, Micologia e Virologia",
"E) O reino Protista abrange bacterias e virus por serem micro-organismos unicelulares, enquanto o reino Monera foi extinto da classificacao de Whittaker e substituido pelo dominio Archaea exclusivamente"
],
explanation:{
correct:"D esta correta: a Parasitologia inclui helmintos (vermes macroscopicos), fugindo do escopo da Microbiologia. A Microbiologia moderna = Bacteriologia + Micologia + Virologia.",
wrongs:{
"A":"Incorreta: fungos sao EUCARIONTES (nao procariontes) e sua parede e de QUITINA (nao celulose). Micologia nao e subdivisao da Parasitologia.",
"B":"Incorreta: a Microbiologia moderna possui TRES subdivisoes (Bacteriologia, Micologia, Virologia). Parasitologia foi separada por incluir helmintos macroscopicos.",
"C":"Incorreta: o reino Monera agrupa PROCARIONTES (bacterias), nao eucariontes. Protozoarios pertencem ao reino Protista.",
"E":"Incorreta: bacterias pertencem ao reino Monera e virus nao pertencem a nenhum reino de Whittaker. Protista abrange eucariontes unicelulares como protozoarios."
},
topicRef:"Fundamentos -- Classificacao e Microbiologia Moderna"
}
},
// Q3 - fundamentos - facil - A
{
id:3, topic:"fundamentos", diff:"facil", answer:"A",
stem:"Durante uma aula pratica, o professor solicita que os alunos identifiquem corretamente a nomenclatura binomial de uma bacteria isolada de uma amostra clinica. Um aluno escreve no prontuario apenas 'E. coli' sem ter mencionado o nome completo anteriormente.",
question:"Sobre as regras de nomenclatura cientifica binomial, assinale a alternativa correta.",
options:[
"A) A abreviacao 'E. coli' so pode ser utilizada apos a primeira mencao do nome completo no documento, pois pode referir-se tanto a Escherichia coli (bacteria) quanto a Entamoeba coli (protozoario)",
"B) A designacao 'coli' e suficiente para identificar o organismo em qualquer contexto clinico, dispensando o genero, pois nao existem outros micro-organismos que compartilhem essa especie",
"C) O nome cientifico deve ser escrito com ambas as iniciais em letra maiuscula e sem destaque tipografico, seguindo o padrao adotado pela maioria dos laboratorios de analises clinicas modernos",
"D) A notacao spp. indica que todas as especies do genero compartilham determinada caracteristica biologica, enquanto sp. se refere exclusivamente a varias (mas nao todas) as especies do genero",
"E) A nomenclatura binomial exige que o nome do genero seja precedido pelo artigo definido em textos cientificos formais, conforme norma gramatical da lingua portuguesa para substantivos proprios"
],
explanation:{
correct:"A esta correta: a abreviacao so e valida apos a primeira mencao por extenso. 'E. coli' pode ser Escherichia coli ou Entamoeba coli, gerando ambiguidade clinica grave.",
wrongs:{
"B":"Incorreta: tres organismos diferentes compartilham 'coli' como especie (Escherichia coli, Entamoeba coli, Balantidium coli). Sem o genero, a identificacao e impossivel.",
"C":"Incorreta: a inicial do genero e maiuscula e a da especie e minuscula. Alem disso, o nome deve ser destacado em italico (digitado) ou sublinhado (manuscrito).",
"D":"Incorreta: inverte os conceitos -- sp. = uma especie nao identificada do genero (singular); spp. = varias/multiplas especies do genero (plural).",
"E":"Incorreta: em texto cientifico formal, NAO se usa artigo definido antes do nome cientifico."
},
topicRef:"Fundamentos -- Nomenclatura Binomial"
}
},
// Q4 - fundamentos - medio - C
{
id:4, topic:"fundamentos", diff:"medio", answer:"C",
stem:"Uma medica residente recebe o resultado de uma lamina corada pelo metodo de Gram de uma amostra de liquor de uma crianca com suspeita de meningite. O laudo descreve a presenca de diplococos Gram-positivos lancetados.",
question:"Com base nesse achado microbiologico e no contexto clinico, qual e a interpretacao mais adequada?",
options:[
"A) O achado sugere infeccao por Neisseria meningitidis, que se apresenta como diplococo Gram-positivo lancetado no liquor e constitui a causa mais frequente de meningite bacteriana fulminante",
"B) Diplococos Gram-positivos lancetados no liquor indicam Staphylococcus aureus, micro-organismo que forma pares de cocos com morfologia lancetada quando cultivado em meios liquidos especiais",
"C) O achado indica Streptococcus pneumoniae, unico diplococo Gram-positivo lancetado clinicamente relevante no liquor, devendo-se considerar a possibilidade de resistencia a betalactamicos",
"D) A presenca de diplococos lancetados Gram-positivos no liquor aponta para Haemophilus influenzae tipo b, que assume forma lancetada quando submetido a condicoes de estresse imunologico",
"E) Esse achado e compativel com Streptococcus pyogenes, que normalmente se apresenta em cadeias longas, porem no liquor cefalorraquidiano assume arranjo diplococico por influencia do pH alcalino"
],
explanation:{
correct:"C esta correta: Streptococcus pneumoniae e o unico diplococo Gram-positivo lancetado relevante encontrado no liquor. Pode apresentar resistencia a betalactamicos, exigindo atencao terapeutica.",
wrongs:{
"A":"Incorreta: Neisseria meningitidis e diplococo Gram-NEGATIVO (nao positivo). Embora cause meningite, sua coloracao de Gram e diferente.",
"B":"Incorreta: S. aureus se apresenta em arranjo de 'cachos de uva' (estafilococo), nao como diplococo lancetado.",
"D":"Incorreta: H. influenzae e um cocobacilo Gram-negativo (nao diplococo Gram-positivo lancetado).",
"E":"Incorreta: S. pyogenes apresenta-se em cadeias longas (estreptococo) e nao assume arranjo diplococico lancetado no liquor."
},
topicRef:"Fundamentos/Morfologia -- Diplococos e Diagnostico"
}
},
// Q5 - fundamentos - dificil - E
{
id:5, topic:"fundamentos", diff:"dificil", answer:"E",
stem:"Um infectologista analisa resultados de culturas de diferentes pacientes internados. Ele precisa correlacionar os achados laboratoriais com os principios de taxonomia e classificacao para orientar a conduta terapeutica adequada em cada caso.",
question:"Considerando os principios de classificacao e nomenclatura microbiologica aplicados a pratica clinica, assinale a alternativa correta.",
options:[

stem:"Em uma enfermaria, dois pacientes desenvolvem infeccoes graves. Paciente A tem sepse por S. aureus resistente a oxacilina (MRSA). Paciente B tem infeccao urinaria por Klebsiella pneumoniae produtora de carbapenemase (KPC).",

"a) O anticorpo monomero possui: Porcao FAB (fragmento de ligacao ao antigeno) = regiao variavel, as 'maozinhas' do anticorpo, responsavel pela ESPECIFICIDADE (reconhecimento e ligacao ao antigeno). Duas regioes Fab por monomero. Porcao FC (fragmento cristalizavel) = regiao constante, a 'bundinha' do anticorpo, determina a CLASSE (isotipo: IgM, IgG, IgA, IgD, IgE) e media as FUNCOES EFETORAS do anticorpo.",

"d) Na imunidade inata, a celula NK reconhece celulas estranhas sem especificidade (sem receptor especifico para antigeno). Na ADCC, a NK se liga a porcao Fc do anticorpo que esta ligado (pela Fab) ao patogeno ou celula infectada. Assim, a NK 'adquire' especificidade (direcionada pelo anticorpo) e usa perforinas/granzimas para induzir apoptose da celula-alvo."

let mode = 'simulado';
let answers = {};
let revealed = {};
let currentTab = 'objetivas';

// =========================================================
// FUNCTIONS
// =========================================================
function toggleTheme() {
  document.body.classList.toggle('light-mode');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tabs .tab').forEach(t => t.classList.remove('active'));
  if(tab === 'objetivas') {
    document.querySelector('.nav-tabs .tab:first-child').classList.add('active');
    document.getElementById('tab-objetivas').classList.remove('hidden');
    document.getElementById('tab-dissertativas').classList.add('hidden');
  } else {
    document.querySelector('.nav-tabs .tab:last-child').classList.add('active');
    document.getElementById('tab-objetivas').classList.add('hidden');
    document.getElementById('tab-dissertativas').classList.remove('hidden');
  }
}

function setMode(m) {
  mode = m;
  document.getElementById('btnEstudo').classList.toggle('active', m==='estudo');
  document.getElementById('btnSimulado').classList.toggle('active', m==='simulado');
  answers = {};
  revealed = {};
  document.getElementById('simuladoResults').style.display = 'none';
  renderQuestions();
}

function applyFilters() {
  answers = {};
  revealed = {};
  document.getElementById('simuladoResults').style.display = 'none';
  renderQuestions();
}

function getFiltered() {
  let t = document.getElementById('filterTopic').value;
  let d = document.getElementById('filterDiff').value;
  return questions.filter(q => {
    if(t !== 'all' && q.topic !== t) return false;
    if(d !== 'all' && q.diff !== d) return false;
    return true;
  });
}

function diffLabel(d) {
  return d==='facil'?'Facil':d==='medio'?'Medio':'Dificil';
}
function topicLabel(t) {
  const m = {fundamentos:'Fundamentos',microbiota:'Microbiota/Cultivo',infeccioso:'Proc. Infeccioso',toxinas:'Toxinas',morfologia:'Morfologia/Estrutura',virologia:'Virologia',imunologia:'Imunologia',hipersensibilidade:'Hipersensibilidades','micologia-geral':'Micologia Geral','micologia-clinica':'Micologia Clinica',ascomycota:'Ascomycota'};
  return m[t]||t;
}

function renderQuestions() {
  const filtered = getFiltered();
  const c = document.getElementById('questionsContainer');
  let html = '';
  filtered.forEach(q => {
    const answered = answers[q.id] !== undefined;
    const isCorrect = answers[q.id] === q.answer;
    let cardClass = 'question-card';
    if(answered && mode==='estudo') cardClass += isCorrect?' correct-border':' wrong-border';
    html += `<div class="${cardClass}" id="qcard-${q.id}">`;
    html += `<div class="q-header"><span class="q-num">Questao ${q.id}</span><div class="q-tags"><span class="tag ${q.diff}">${diffLabel(q.diff)}</span><span class="tag">${topicLabel(q.topic)}</span></div></div>`;
    html += `<div class="q-stem"><p>${q.stem}</p><p><strong>${q.question}</strong></p></div>`;
    html += `<ul class="options">`;
    q.options.forEach((opt,i) => {
      const letter = 'ABCDE'[i];
      let liClass = '';
      if(answered && mode==='estudo') {
        liClass = 'disabled';
        if(letter === q.answer) liClass += ' correct-opt';
        else if(letter === answers[q.id]) liClass += ' wrong-opt';
      } else if(answered && mode==='simulado' && !revealed[q.id]) {
        liClass = letter === answers[q.id] ? 'selected disabled' : 'disabled';
      } else if(answered && mode==='simulado' && revealed[q.id]) {
        liClass = 'disabled';
        if(letter === q.answer) liClass += ' correct-opt';
        else if(letter === answers[q.id] && letter !== q.answer) liClass += ' wrong-opt';
      }
      html += `<li class="${liClass}" onclick="selectAnswer(${q.id},'${letter}')">${opt}</li>`;
    });
    html += `</ul>`;
    // explanation
    const showExp = (mode==='estudo' && answered) || (mode==='simulado' && revealed[q.id]);
    html += `<div class="explanation ${showExp?'show':''}">`;
    html += `<h4>Explicacao</h4>`;
    html += `<p class="exp-correct">CORRETA (${q.answer}): ${q.explanation.correct}</p>`;
    for(let k in q.explanation.wrongs) {
      html += `<p class="exp-wrong">${k}: ${q.explanation.wrongs[k]}</p>`;
    }
    html += `<p class="exp-topic">Tema: ${q.explanation.topicRef}</p>`;
    html += `</div>`;
    html += `</div>`;
  });
  c.innerHTML = html;
  updateStats(filtered);
  document.getElementById('btnFinishWrap').classList.toggle('hidden', mode!=='simulado' || Object.keys(answers).length===0);

  // essays
  const ec = document.getElementById('essayContainer');
  let ehtml = '';
  essays.forEach(e => {
    ehtml += `<div class="essay-card"><div class="q-header"><span class="q-num">Dissertativa ${e.id} -- ${e.title}</span><div class="q-tags"><span class="tag">${topicLabel(e.topic)}</span></div></div>`;
    ehtml += `<div class="case"><p>${e.case_text}</p></div>`;
    e.subqs.forEach((sq,i) => {
      ehtml += `<div class="sub-q"><div class="sub-label">${sq.label} ${sq.q}</div><textarea placeholder="Sua resposta..."></textarea>`;
      ehtml += `<div class="essay-answer" id="ea-${e.id}-${i}"><h4>Resposta esperada:</h4><p>${e.answers[i]}</p></div></div>`;
    });
    ehtml += `<button class="btn sm secondary" onclick="toggleEssayAnswers(${e.id}, ${e.subqs.length})">Mostrar/Ocultar Respostas</button></div>`;
  });
  ec.innerHTML = ehtml;
}

function toggleEssayAnswers(eid, count) {
  for(let i=0;i<count;i++) {
    const el = document.getElementById(`ea-${eid}-${i}`);
    el.classList.toggle('show');
  }
}

function selectAnswer(qid, letter) {
  if(answers[qid] !== undefined) return;
  answers[qid] = letter;
  const filtered = getFiltered();
  if(mode === 'estudo') {
    renderQuestions();
  } else {
    renderQuestions();
  }
}

function updateStats(filtered) {
  const total = filtered.length;
  let correct = 0, wrong = 0;
  filtered.forEach(q => {
    if(answers[q.id] !== undefined) {
      if(answers[q.id] === q.answer) correct++;
      else wrong++;
    }
  });
  const pending = total - correct - wrong;
  const pct = (correct+wrong)>0 ? Math.round(correct/(correct+wrong)*100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statPct').textContent = pct + '%';
  const progress = total>0 ? Math.round((correct+wrong)/total*100) : 0;
  document.getElementById('progressFill').style.width = progress + '%';
}

function finishSimulado() {
  const filtered = getFiltered();
  let correct=0, wrong=0;
  const topicStats = {};
  const diffStats = {};
  filtered.forEach(q => {
    if(!topicStats[q.topic]) topicStats[q.topic] = {c:0,t:0};
    if(!diffStats[q.diff]) diffStats[q.diff] = {c:0,t:0};
    topicStats[q.topic].t++;
    diffStats[q.diff].t++;
    if(answers[q.id] !== undefined) {
      if(answers[q.id] === q.answer) { correct++; topicStats[q.topic].c++; diffStats[q.diff].c++; }
      else wrong++;
    }
  });
  const total = correct + wrong;
  const pct = total>0 ? Math.round(correct/total*100) : 0;
  const sb = document.getElementById('scoreBig');
  sb.textContent = pct + '%';
  sb.className = 'score-big ' + (pct>=70?'good':pct>=50?'ok':'bad');
  document.getElementById('scoreText').textContent = `${correct} acertos em ${total} respondidas (${filtered.length} questoes no filtro)`;

  let gridHtml = '';
  for(let t in topicStats) {
    const s = topicStats[t];
    gridHtml += `<div class="rg-item"><div class="rg-label">${topicLabel(t)}</div><div class="rg-val">${s.c}/${s.t}</div></div>`;
  }
  for(let d in diffStats) {
    const s = diffStats[d];
    gridHtml += `<div class="rg-item"><div class="rg-label">${diffLabel(d)}</div><div class="rg-val">${s.c}/${s.t}</div></div>`;
  }
  document.getElementById('resultsGrid').innerHTML = gridHtml;

  // --- DIAGNOSTICO ---
  const RESUMAO_BASE = 'https://cortexgbmd.github.io/microp1resumo/';
  const topicToResumo = {
    'fundamentos':        {anchor:'#fund', label:'Fundamentos de Microbiologia', subtopics:'Classificacao, nomenclatura binomial, reinos, procarioto vs eucarioto, escalas de tamanho'},
    'microbiota':         {anchor:'#fund', label:'Fundamentos (Microbiota e Cultivo)', subtopics:'Microbiota permanente/transitoria, disbiose, meios de cultura, UFC'},
    'infeccioso':         {anchor:'#inf',  label:'Processo Infeccioso', subtopics:'Etapas da infeccao (implantacao, adaptacao, multiplicacao, dano), fatores de virulencia'},
    'toxinas':            {anchor:'#tox',  label:'Toxinas (Exo e Endotoxinas)', subtopics:'ETEC (LT/ST), EHEC (Shiga-like), esfoliatina, LPS'},
    'morfologia':         {anchor:'#bact', label:'Bacteriologia', subtopics:'Formas/arranjos, Gram, estruturas essenciais/facultativas, endosporo, resistencia'},
    'virologia':          {anchor:'#viro', label:'Virologia', subtopics:'Efeito citopatico, latencia viral, envelope (herpes vs HIV)'},
    'imunologia':         {anchor:'#imuno',label:'Imunologia', subtopics:'Anticorpos (Fab/Fc), 5 classes Ig, 3 funcoes, opsonizacao, complemento'},
    'hipersensibilidade': {anchor:'#hiper',label:'Hipersensibilidades e Autoimunidade', subtopics:'4 tipos, triade autoimune, mimetismo molecular, febre reumatica'},
    'micologia-geral':    {anchor:'#mico', label:'Micologia Geral', subtopics:'Quitina, bolores vs leveduras, hifas, dimorfismo, Paracoccidioides'},
    'micologia-clinica':  {anchor:'#cripto',label:'Criptococose', subtopics:'GXM/GXM-Gal, melanina, 3 vias SNC, celula tita, mucicarmina'},
    'ascomycota':         {anchor:'#asco', label:'Ascomycota (Candida e Aspergillus)', subtopics:'Moniliase, ascosporos/conidios, aflatoxina, aspergilose pulmonar, antifungicos'}
  };

  const weakTopics = [];
  for(let t in topicStats) {
    const s = topicStats[t];
    const wrongCount = s.t - s.c;
    const pctTopic = s.t > 0 ? Math.round(s.c / s.t * 100) : 100;
    if(wrongCount > 0 && pctTopic < 100) {
      const info = topicToResumo[t] || {anchor:'', label:topicLabel(t), subtopics:''};
      weakTopics.push({topic:t, info, wrongCount, total:s.t, correct:s.c, pct:pctTopic});
    }
  }
  weakTopics.sort((a,b) => a.pct - b.pct);

  let diagHtml = '<div class="diagnostico">';
  if(weakTopics.length === 0) {
    diagHtml += '<h3>Diagnostico de Estudo</h3><p class="diag-ok">Parabens! Voce acertou todas as questoes. Nenhuma revisao necessaria.</p>';
  } else {
    diagHtml += '<h3>Diagnostico: o que revisar no Resumao</h3>';
    diagHtml += '<p style="color:var(--text-muted);font-size:.88rem;margin-bottom:14px;">Baseado nas questoes que voce errou, estas sao as secoes do resumao que voce precisa revisar (ordenadas da mais fraca para a mais forte):</p>';
    weakTopics.forEach(w => {
      const severity = w.pct < 50 ? '' : ' warn';
      const emoji = w.pct < 50 ? '🔴' : '🟡';
      diagHtml += `<div class="diag-item${severity}">`;
      diagHtml += `<div class="diag-topic">${emoji} ${w.info.label} — ${w.correct}/${w.total} (${w.pct}%)</div>`;
      diagHtml += `<div class="diag-detail">Voce errou ${w.wrongCount} questao(oes). Revise: ${w.info.subtopics}</div>`;
      if(w.info.anchor) {
        diagHtml += `<a href="${RESUMAO_BASE}${w.info.anchor}" target="_blank" rel="noopener">Abrir no Resumao &rarr;</a>`;
      }
      diagHtml += '</div>';
    });
  }
  diagHtml += '</div>';
  document.getElementById('diagnosticoPanel').innerHTML = diagHtml;

  document.getElementById('simuladoResults').style.display = 'block';
  document.getElementById('btnFinishWrap').classList.add('hidden');
  // reveal all
  filtered.forEach(q => { revealed[q.id] = true; });
  renderQuestions();
}

function reviewSimulado() {
  document.getElementById('simuladoResults').style.display = 'none';
  window.scrollTo({top: document.getElementById('questionsContainer').offsetTop - 100, behavior:'smooth'});
}

function resetAll() {
  answers = {};
  revealed = {};
  document.getElementById('simuladoResults').style.display = 'none';
  document.getElementById('diagnosticoPanel').innerHTML = '';
  renderQuestions();
  window.scrollTo({top:0, behavior:'smooth'});
}

// Init
renderQuestions();
</script>
</body>
</html>

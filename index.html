<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Questões - Microbiologia P1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-tertiary: #262c36;
            --accent-blue: #4a9eff;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --accent-yellow: #fbbf24;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --border: #374151;
        }

        body.light-mode {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --accent-blue: #2563eb;
            --accent-green: #059669;
            --accent-red: #dc2626;
            --accent-yellow: #d97706;
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.6;
        }

        .container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--bg-tertiary);
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            padding: 0 8px;
        }

        .nav-button {
            display: block;
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 6px;
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            transition: all 0.2s;
            font-weight: 500;
        }

        .nav-button:hover {
            background-color: var(--bg-tertiary);
            color: var(--accent-blue);
        }

        .nav-button.active {
            background-color: var(--bg-tertiary);
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 12px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mode-btn:hover {
            background-color: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .mode-btn.active {
            background-color: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .header-content h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .header-content p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .progress-indicator {
            text-align: right;
        }

        .progress-bar {
            width: 180px;
            height: 6px;
            background-color: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-green);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .question-container {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .question-number {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 20px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .question-text strong {
            color: var(--accent-blue);
        }

        .difficulty-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 16px;
            margin-right: 8px;
            letter-spacing: 0.5px;
        }

        .difficulty-easy {
            background-color: rgba(52, 211, 153, 0.15);
            color: var(--accent-green);
        }

        .difficulty-medium {
            background-color: rgba(251, 191, 36, 0.15);
            color: var(--accent-yellow);
        }

        .difficulty-hard {
            background-color: rgba(248, 113, 113, 0.15);
            color: var(--accent-red);
        }

        .lecture-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            background-color: rgba(74, 158, 255, 0.15);
            color: var(--accent-blue);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .alternatives {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alternative {
            padding: 12px 16px;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
            user-select: none;
        }

        .alternative:hover {
            background-color: var(--bg-primary);
            border-color: var(--accent-blue);
        }

        .alternative.selected {
            background-color: var(--bg-primary);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            font-weight: 500;
        }

        .alternative.correct {
            background-color: rgba(52, 211, 153, 0.2);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .alternative.incorrect {
            background-color: rgba(248, 113, 113, 0.2);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .explanation {
            margin-top: 20px;
            padding: 16px;
            background-color: var(--bg-tertiary);
            border-left: 4px solid var(--accent-blue);
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.7;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation-title {
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .explanation-correct {
            color: var(--accent-green);
            font-weight: 600;
            margin: 12px 0 6px 0;
        }

        .explanation-wrong {
            color: var(--accent-red);
            font-weight: 600;
            margin: 12px 0 6px 0;
        }

        .explanation-text {
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .explanation-lecture {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background-color: var(--bg-primary);
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .results-score {
            font-size: 48px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 16px;
        }

        .results-message {
            font-size: 20px;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .results-detail {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .result-stat {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
        }

        .result-stat:last-child {
            border-bottom: none;
        }

        .essay-question {
            background-color: var(--bg-secondary);
            border: 2px dashed var(--accent-yellow);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .essay-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            background-color: rgba(251, 191, 36, 0.15);
            color: var(--accent-yellow);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .essay-text-area {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            margin: 16px 0;
            resize: vertical;
        }

        .essay-text-area::placeholder {
            color: var(--text-secondary);
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 120px;
                overflow-x: auto;
                overflow-y: hidden;
                display: flex;
                gap: 20px;
                padding: 16px;
            }

            .sidebar > * {
                flex-shrink: 0;
            }

            .main-content {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .progress-indicator {
                text-align: left;
            }

            .progress-bar {
                width: 100%;
                max-width: 300px;
            }

            .mode-selector {
                width: 100%;
            }

            .mode-btn {
                font-size: 11px;
                padding: 6px 8px;
            }
        }

        .scroll-content {
            scroll-behavior: smooth;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .essay-gabarito {
            margin-top: 16px;
            padding: 16px;
            background-color: var(--bg-tertiary);
            border-left: 4px solid var(--accent-green);
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.7;
            display: none;
        }

        .essay-gabarito.show {
            display: block;
        }

        .essay-gabarito-title {
            font-weight: 600;
            color: var(--accent-green);
            margin-bottom: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-gabarito {
            padding: 8px 16px;
            background-color: var(--bg-tertiary);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-gabarito:hover {
            background-color: var(--accent-green);
            color: var(--bg-primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Questões</span>
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
            </div>

            <div class="mode-selector">
                <button class="mode-btn active" data-mode="estudo" onclick="setMode('estudo')">Estudo</button>
                <button class="mode-btn" data-mode="simulado" onclick="setMode('simulado')">Simulado</button>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Por Aula</div>
                <button class="nav-button active" onclick="filterByLecture('aula1')">Aula 1 - Classificação</button>
                <button class="nav-button" onclick="filterByLecture('aula2')">Aula 2 - Patogênese/Virulência</button>
                <button class="nav-button" onclick="filterByLecture('aula3')">Aula 3 - Microbiota</button>
                <button class="nav-button" onclick="filterByLecture('aula4')">Aula 4 - Virologia</button>
                <button class="nav-button" onclick="filterByLecture('aula5')">Aula 5 - Ferro/Fungos</button>
                <button class="nav-button" onclick="filterByLecture('aula6')">Aula 6 - Bactérias</button>
                <button class="nav-button" onclick="filterByLecture('todas')">Todas as Aulas</button>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Por Dificuldade</div>
                <button class="nav-button" onclick="filterByDifficulty('facil')">Fácil</button>
                <button class="nav-button" onclick="filterByDifficulty('medio')">Médio</button>
                <button class="nav-button" onclick="filterByDifficulty('dificil')">Difícil</button>
            </div>
        </div>

        <div class="main-content scroll-content">
            <div class="header">
                <div class="header-content">
                    <h1>Banco de Questões</h1>
                    <p>Microbiologia P1 - ENAMED Style</p>
                </div>
                <div class="progress-indicator">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0 de 0</div>
                </div>
            </div>

            <div id="questionsContainer"></div>
            <div id="resultsContainer" class="results-container"></div>
        </div>
    </div>

    <script>
        // Question Bank Data
        const questions = [
            {
    id: 1,
    lecture: 'aula1',
    difficulty: 'facil',
    type: 'objective',
    text: 'A nomenclatura científica dos micro-organismos utiliza o sistema binomial de classificação. Qual é o padrão correto para a <strong>nomenclatura binomial</strong>?',
    alternatives: [
      { letter: 'A', text: 'Inicial do gênero em maiúscula, inicial da espécie em minúscula, ambos em itálico' },
      { letter: 'B', text: 'Gênero completo em minúscula, espécie em maiúscula, separados por ponto' },
      { letter: 'C', text: 'Gênero e espécie em maiúsculas, sem itálico, separados por hífen' },
      { letter: 'D', text: 'Espécie em maiúscula, gênero em minúscula, ambos em negrito' },
      { letter: 'E', text: 'Apenas a espécie em itálico, sem necessidade do gênero' }
    ],
    correct: 'A',
    explanation: {
      correct: 'A nomenclatura binomial segue rigorosamente o padrão: inicial do gênero em maiúscula, espécie completa em minúscula, ambos em itálico. Por exemplo: Candida albicans.',
      wrong: {
        B: 'Ambas as partes não ficam em minúscula. O gênero sempre inicia com letra maiúscula.',
        C: 'Não há separação por hífen nem ambos ficam em maiúscula na nomenclatura binomial correta.',
        D: 'Negrito não é o formato apropriado; deve ser itálico. Além disso, apenas o gênero começa em maiúscula.',
        E: 'Ambas as partes (gênero e espécie) devem estar em itálico, não apenas a espécie.'
      }
    }
  },
  {
    id: 2,
    lecture: 'aula1',
    difficulty: 'facil',
    type: 'objective',
    text: 'Qual das alternativas corretamente diferencia <strong>eucariotos</strong> de <strong>procariotos</strong> no contexto da classificação microbiana?',
    alternatives: [
      { letter: 'A', text: 'Eucariotos carecem de núcleo definido; procariotos possuem envoltório nuclear bem delimitado' },
      { letter: 'B', text: 'Eucariotos possuem envoltório nuclear; procariotos não possuem núcleo membranoso' },
      { letter: 'C', text: 'Procariotos são maiores e mais complexos que eucariotos' },
      { letter: 'D', text: 'Eucariotos englobam apenas bactérias; procariotos englobam fungos e animais' },
      { letter: 'E', text: 'A diferença principal está na presença ou ausência de ribossomos' }
    ],
    correct: 'B',
    explanation: {
      correct: 'A principal diferença entre eucariotos e procariotos é a presença de um envoltório nuclear (membrana nuclear) delimitando o material genético. Fungos e animais são eucariotos; bactérias são procariotos.',
      wrong: {
        A: 'Inverteu a característica: eucariotos TÊM núcleo definido, procariotos NÃO.',
        C: 'Na realidade, procariotos (bactérias) são geralmente menores que eucariotos como fungos e animais.',
        D: 'Inverteu a classificação: procariotos são bactérias/arqueias; eucariotos englobam fungos e animais.',
        E: 'Ambos possuem ribossomos, embora de tamanhos diferentes (70S em procariotos, 80S em eucariotos).'
      }
    }
  },
  {
    id: 3,
    lecture: 'aula1',
    difficulty: 'medio',
    type: 'objective',
    text: 'Uma paciente apresenta lesões de micose superficial com prurido intenso. Na microscopia com KOH 10%, observa-se dissolução de estruturas celulares deixando visível uma parede resistente. Qual componente da parede fúngica é visualizado neste teste?',
    alternatives: [
      { letter: 'A', text: 'Peptideoglicano, que é específico de fungos leveduriformes' },
      { letter: 'B', text: 'Celulose, polissacarídeo estrutural de fungos filamentosos' },
      { letter: 'C', text: 'Glucana, que confere resistência à parede celular fúngica' },
      { letter: 'D', text: 'Quitina, polissacarídeo que mantém a integridade da parede' },
      { letter: 'E', text: 'Lipopolissacarídeo, componente de proteção contra antifúngicos' }
    ],
    correct: 'D',
    explanation: {
      correct: 'A parede celular dos fungos é composta por quitina (não celulose como em plantas). O KOH 10% dissolve as células deixando a quitina visível, que é resistente e mantém a forma da estrutura.',
      wrong: {
        A: 'Peptideoglicano é componente de bactérias, não fungos.',
        B: 'Celulose é encontrada em plantas, não em fungos. Fungos não possuem celulose.',
        C: 'Glucana (β-glucana) faz parte da parede, mas é a quitina que permanece visível após KOH.',
        E: 'Lipopolissacarídeo (LPS) é componente de bactérias Gram-negativas, não de fungos.'
      }
    }
  },
  {
    id: 4,
    lecture: 'aula1',
    difficulty: 'medio',
    type: 'objective',
    text: 'Um bolor (mofo) observado em uma lesão de pele mostra estruturas filamentosas ramificadas. Qual das alternativas melhor caracteriza a morfologia e reprodução deste fungo?',
    alternatives: [
      { letter: 'A', text: 'Células arredondadas que se reproduzem por brotamento simples' },
      { letter: 'B', text: 'Filamentos (hifas) que se reproduzem por formação de esporos' },
      { letter: 'C', text: 'Estruturas unicelulares com reprodução por fissão binária' },
      { letter: 'D', text: 'Hifas com parede de peptideoglicano resistente a antifúngicos' },
      { letter: 'E', text: 'Células com capacidade de movimentação por flagelos' }
    ],
    correct: 'C',
    explanation: {
      correct: 'Bolores (mofos) são fungos filamentosos compostos por hifas (filamentos) que formam um micélio. Eles se reproduzem através da formação de esporos, estruturas de dispersão que germinam em novas hifas.',
      wrong: {
        A: 'Essa descrição caracteriza leveduras (células arredondadas), não bolores.',
        B: 'Bolores realmente formam esporos, mas não são estruturas unicelulares.',
        D: 'Fungos têm parede de quitina, não peptideoglicano, e quitina confere resistência relativa a alguns antifúngicos.',
        E: 'Fungos não possuem flagelos. Essa característica é de algumas bactérias (bacilos).'
      }
    }
  },
  {

                answer: '<strong>ETEC</strong> (Escherichia coli enterotoxigênica) e <strong>EHEC</strong> (Escherichia coli entero-hemorrágica) diferem fundamentalmente em seus mecanismos patogênicos. ETEC produz duas exotoxinas — <strong>termolábil (LT)</strong>, que aumenta AMP cíclico, e <strong>termoestável (ST)</strong>, que aumenta GMP cíclico — que se ligam a receptores de enterócitos, causando distúrbios eletrolíticos, resultando em diarreia secretória.<br><br>EHEC é mais grave porque produz <strong>toxina Shiga-like</strong>, que penetra a célula e inibe síntese proteica ao nível ribossomal (60S), induzindo apoptose e necrose de células endoteliais. Isso causa dano tecidual local com sangramento nas fezes. Quando EHEC dissemina via corrente sanguínea, a toxina danifica células endoteliais de pequenos vasos renais, levando à <strong>síndrome hemolítico-urêmica</strong> com hemólise, trombocitopenia e insuficiência renal aguda, frequentemente fatal.'
            },
            {
                id: 53,
                lecture: 'aula3',
                text: 'Explique o conceito de microbiota normal e desbiose. Como a microbiota permanente protege contra patógenos e qual é o papel de antibióticos nesta alteração?',
                answer: 'A <strong>microbiota normal</strong> refere-se aos microrganismos residentes em regiões de pele e mucosa do corpo humano, compostos principalmente por bactérias. Divide-se em <strong>microbiota permanente</strong> (mais profunda, residente) e <strong>transitória</strong> (adquirida diariamente, removível por higiene).<br><br><strong>Disbiose</strong> é o desequilíbrio dessa microbiota, como quando <strong>Staphylococcus epidermidis</strong> é removido de axilas por agentes químicos abrasivos. A microbiota permanente protege contra patógenos através de competição por nutrientes, produção de metabolitos antimicrobianos e estímulo contínuo da resposta imune inata. Antibióticos destroem essa proteção eliminando indiscriminadamente bactérias comensais, permitindo crescimento excessivo de organismos oportunistas como Candida, especialmente quando a microbiota não consegue se recuperar em 8-24 horas.'
            },
            {
                id: 54,
                lecture: 'aula4',
                text: 'Discuta a latência viral usando herpes simplex como modelo. Qual é a diferença entre infecção primária, reativação e reinfecção?',
                answer: 'A <strong>latência viral</strong> exemplificada por herpes simplex envolve permanência do genoma viral em estado epissomal (circular, quiescente) no núcleo de células nervosas. Durante a infecção primária, o vírus replica-se, causa lesões evidentes e citopático destruitivo. O material genético então se circulariza e fica silencioso sob pressão de citocinas imunológicas em hospedeiros imunocompetentes.<br><br>Na <strong>reativação</strong>, estresse ou imunossupressão leve reduzem pressão citocínica; o vírus sai da latência, replica-se no núcleo, é empacotado no complexo de Golgi e liberado por exocitose, causando recorrências. <strong>Reinfecção</strong> difere por ser exposição a novo vírus exógeno. Herpes tipicamente apresenta reativações em face, membros ou lábios, características da latência neural.'
            },
            {
                id: 55,

                answer: 'O <strong>ferro é crítico</strong> na patogênese de infecções fúngicas, particularmente em <i>Cryptococcus neoformans</i>, pois é constituinte essencial do metabolismo fúngico (cofator de enzimas, transporte eletrônico). Cryptococcus possui mecanismos sofisticados de aquisição de ferro, incluindo síntese de melanina, pigmento que também funciona como quelante de ferro e fator de virulência.<br><br><strong>Hemocromatose hereditária</strong> aumenta drasticamente o risco de criptococose ao elevar ferro sérico livre, tornando-o biodisponível ao fungo além dos mecanismos naturais de quelação de transferrina. Indivíduos com múltiplas transfusões ou anemia aplástica, que desenvolvem sobrecarga secundária de ferro, também apresentam predisposição aumentada. Essencialmente, elevado ferro circulante transforma o hospedeiro em ambiente ideal para crescimento e virulência de Cryptococcus.'
            },
            {
                id: 56,
                lecture: 'aula6',
                text: 'Descreva as diferenças estruturais entre parede celular de bactérias Gram-positivas e Gram-negativas, explicando as implicações clínicas para virulência e sensibilidade a antibióticos.',
                answer: 'A <strong>parede celular bacteriana</strong> estruturalmente difere entre Gram-positivas e Gram-negativas. Bactérias Gram-positivas possuem camada espessa de <strong>peptidoglicano</strong> (composto de N-acetilglucosamina e ácido N-acetilmurâmico) com proteínas de ancoragem que facilitam adesão e evasão, enquanto Gram-negativas apresentam peptidoglicano fino com membrana externa contendo <strong>lipopolissacarídeo (LPS)</strong>, potente endotoxina inflamatória.<br><br>Implicações clínicas são significativas: LPS de Gram-negativas causa sepse severa e choque endotóxico; Gram-positivas possuem <strong>ácidos teicóicos</strong> (componentes da parede, não cápsula) que contribuem para adesão e evasão, além de cápsulas polissacarídicas em espécies como <i>S. pneumoniae</i>. Antibióticos β-lactâmicos ligam-se a proteínas de ligação à penicilina (PBPs) e inibem síntese de peptidoglicano. Gram-negativas tendem a ser <strong>mais resistentes</strong> a β-lactâmicos, pois a membrana externa atua como barreira adicional — apenas alguns β-lactâmicos conseguem atravessá-la via porinas.'
            },
            {
                id: 57,
                lecture: 'aula1',
                text: 'Como a nomenclatura científica binomial é aplicada em microbiologia? Cite exemplos de três fungos patogênicos e explique seus critérios de classificação.',
                answer: 'A <strong>nomenclatura científica binomial</strong> utiliza dois termos: <strong>gênero (maiúscula)</strong> e <strong>espécie (minúscula)</strong>, em itálico ou sublinhado. Não existe espécie sem gênero. Exemplos de fungos patogênicos:<br><br><i>Candida albicans</i> (dimórfico, levedura e hifas, causa candidíase invasiva); <i>Aspergillus fumigatus</i> (monocariótico, forma conídios em cadeia, ascomiceto, causa aspergilose pneumônica); <i>Cryptococcus neoformans</i> (encapsulado, melanina, basidiomiceto, meningite em imunocomprometidos).<br><br>Classificação baseia-se atualmente em características genômicas/moleculares além de morfológicas. Os critérios incluem tipo de reprodução (sexual vs assexual), presença de septos em hifas, parede celular de quitina, e organização geral (eucariontes). A nomenclatura binomial permite identificação precisa em diagnóstico clínico e pesquisa.'
            },
            {
                id: 58,
                lecture: 'aula2',
                text: 'Explique o modelo de patogênese infecciosa (citado pelo Prof. Cassio) aplicado a uma infecção bacteriana comum. Descreva cada etapa do processo infeccioso e como cada uma contribui ao desenvolvimento de doença.',
                answer: 'O modelo de patogênese infecciosa (referenciado pelo Prof. Cassio) divide o processo infeccioso em etapas sequenciais: <strong>1) Implantação:</strong> o patógeno coloniza o local de entrada via fatores de adesão; <strong>2) Adaptação:</strong> resistência às defesas do hospedeiro (fagocitose, ácido gástrico); <strong>3) Multiplicação:</strong> crescimento exponencial quando bem adaptado; <strong>4) Dano/Lesão:</strong> local (inflamação, destruição tecidual) ou disseminado (sepse, múltiplos órgãos).<br><br>Exemplo: <i>Neisseria gonorrhoeae</i> tem dose infecciosa baixíssima (~100 bactérias). Implanta em uretra via fímbrias, adapta-se evadindo resposta inata, multiplica-se causando uretrite, e pode disseminar via macrófagos. <strong>Fatores de virulência</strong> (estruturais como fímbrias, pili; substâncias como exotoxinas secretadas) facilitam cada etapa. Sem implantação bem-sucedida, não há infecção estabelecida.'
            },
            {
                id: 59,
                lecture: 'aula3',
                text: 'Descreva as técnicas de cultivo de microrganismos (meios sólido, líquido e semi-sólido), explicando a indicação clínica de cada uma em microbiologia diagnóstica.',
                answer: 'Três técnicas principais de cultivo de microrganismos com indicações clínicas distintas:<br><br><strong>Meios sólidos</strong> (Agar, Sabouraud com 3% agar): Isolamento de colônias puras em amostras mistas. Indicado para culturas de sangue, urina, swabs de pele/orofaringe em investigação diagnóstica.<br><br><strong>Meios líquidos</strong> (BHI - Infusão de Cérebro e Coração, sem agar): Aumentam concentração de microrganismos; crescimento indiscriminado sem espaço limitado. Indicado quando precisa aumentar inóculo ou recuperar patógenos de amostras com baixa carga microbiana, como hemoculturas iniciais.<br><br><strong>Meios semi-sólidos/viscosos</strong> (agar com 0,3% diluição): Avaliam mobilidade bacteriana e presença de flagelos polares. Indicado para diferenciação de bactérias móveis (bacilos Gram-negativos) vs imóveis, essencial em diagnóstico identificativo de patógenos.'
            },
            {
                id: 60,
                lecture: 'aula4',
                text: 'Diferencie hipersensibilidade tipo I (imediata) de tipo IV (retardada), explicando os mecanismos fisiopatológicos, mediadores envolvidos e exemplos clínicos.',
                answer: '<strong>Hipersensibilidade tipo I (Imediata)</strong> é mediada por <strong>mastócitos e basófilos</strong> sensibilizados com <strong>IgE</strong>. Na reexposição ao antígeno, ocorre ligação cruzada de IgE com liberação explosiva de <strong>mediadores pré-formados</strong> (histamina, triptase, heparina) e <strong>de novo</strong> (leucotrienos, prostaglandinas). Ocorre em minutos: anafilaxia, urticária, asma, rinite alérgica, alergia alimentar.<br><br><strong>Hipersensibilidade tipo IV (Retardada)</strong> é mediada por <strong>linfócitos T CD8 citotóxicos e CD4</strong> produtores de <strong>citocinas</strong> (IFN-γ, IL-2). Sem participação de anticorpos. Ocorre em 24-72 horas com ativação de macrófagos e destruição celular direta. Exemplos: rejeição transplante, tuberculose, dermatite de contato (níquel, plantas). Tipo IV causa lesão granulomatosa em tuberculose pulmonar quando macrófagos ativados formam granulomas.'
            },
            {
                id: 61,
                lecture: 'aula5',
                text: 'Qual é o papel da melanina na virulência de Cryptococcus neoformans? Como fatores ambientais e hospedeiro afetam a síntese deste pigmento?',
                answer: 'A <strong>melanina</strong> de <i>Cryptococcus neoformans</i> é pigmento negro crítico à virulência com múltiplas funções: <strong>1) Quelação de ferro:</strong> captura ferro do hospedeiro tornando-o biodisponível ao fungo; <strong>2) Proteção contra espécies reativas de oxigênio (ROS):</strong> radical scavenging reduzindo morte por fagócitos; <strong>3) Modulação imunológica:</strong> reduz reconhecimento por receptores de padrão de patógeno, diminuindo inflamação inicial.<br><br>Síntese é influenciada por <strong>temperatura:</strong> 37°C em hospedeiro induz maior produção; <strong>pH:</strong> alcalino favorece síntese; <strong>nutrientes:</strong> presença de L-DOPA e outros substratos fenólicos; <strong>estado imunológico:</strong> sob pressão imunológica, Cryptococcus aumenta melanização como mecanismo de evasão. Essa adaptação sofisticada explica sucesso em imunocomprometidos.'
            },
            {
                id: 62,
                lecture: 'aula6',
                text: 'Discuta a importância clínica de estruturas bacterianas como flagelos, cápsulas e fímbrias na virulência e evasão imunológica durante infecção.',
                answer: 'Estruturas bacterianas são determinantes críticos de virulência: <strong>Flagelos</strong> conferem motilidade, permitindo penetração de mucosa (espiroquetoídeos na sífilis com movimentos em parafuso). <strong>Fímbrias</strong> (pili) facilitam adesão a enterócitos (Neisseria gonorrhoeae, E. coli), sendo essenciais para implantação. <strong>Cápsulas</strong> (polissacarídios externos) evitam fagocitose pelo mascaramento de epítopos, como em <i>Streptococcus pneumoniae</i> (diplococos Gram-positivos causadores de meningite infantil) e Meningococo (resistência ao complemento).<br><br>Evasão imunológica inclui variação de cápsula, produção de proteínas de ligação a fibrinogênio (como coagulase em Staphylococcus aureus) que encapsula bactéria em fibrina, protegendo-a de macrófagos. Sem essas estruturas, a bactéria é rapidamente eliminada pelo sistema imune.'
            },
            {
                id: 63,
                lecture: 'todas',
                text: 'Integre conhecimentos de múltiplas aulas: Como a estrutura molecular de microrganismos (bactérias, fungos e vírus) influencia mecanismos de virulência, evasão imunológica e suscetibilidade a agentes antimicrobianos?',
                answer: 'A estrutura molecular de microrganismos fundamenta mecanismos de virulência, evasão e suscetibilidade. <strong>Bactérias Gram-negativas:</strong> LPS endotóxico causa inflamação sistêmica; membrana externa com porinas é barreira adicional que dificulta penetração de muitos β-lactâmicos, conferindo maior resistência. Fímbrias (ETEC) e toxinas (EHEC - Shiga-like) determinam patogênese. <strong>Fungos:</strong> parede de quitina + glucanos ativa receptores inatos; melanina (Cryptococcus) quelata ferro e escapa ROS; dimorfismo (Candida) alterna entre disseminação e invasão.<br><br><strong>Vírus:</strong> envelopes lipídicos contêm glicoproteínas para ligação (herpes simplex rouба membrana nuclear), determinando efeito citopático e latência epissomal. <strong>Suscetibilidade a antimicrobianos:</strong> peptidoglicano (alvo de β-lactâmicos), ergosterol (alvo de azóis fúngicos), síntese proteica viral (alvo de interferons). Hospedeiro imunocomprometido não controla essa estrutura, permitindo replicação descontrolada e invasão disseminada.'
            }
        ]

        let currentMode = 'estudo';
        let currentFilter = { lecture: 'todas', difficulty: null };
        let userAnswers = {};
        let currentQuestionIndex = 0;

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            resetQuestions();
            renderQuestions();
        }

        function filterByLecture(lecture) {
            currentFilter.lecture = lecture;
            currentQuestionIndex = 0;
            document.querySelectorAll('[onclick*="filterByLecture"]').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            resetQuestions();
            renderQuestions();
        }

        function filterByDifficulty(difficulty) {
            currentFilter.difficulty = difficulty;
            currentQuestionIndex = 0;
            resetQuestions();
            renderQuestions();
        }

        function resetQuestions() {
            userAnswers = {};
            currentQuestionIndex = 0;
        }

        function getFilteredQuestions() {
            return questions.filter(q => {
                const lectureMatch = currentFilter.lecture === 'todas' || q.lecture === currentFilter.lecture;
                const difficultyMatch = !currentFilter.difficulty || q.difficulty === currentFilter.difficulty;
                return lectureMatch && difficultyMatch;
            });
        }


        function toggleGabarito(questionId) {
            const el = document.getElementById('gabarito-' + questionId);
            const btn = el.previousElementSibling;
            if (el.classList.contains('show')) {
                el.classList.remove('show');
                btn.textContent = 'Ver Gabarito';
            } else {
                el.classList.add('show');
                btn.textContent = 'Ocultar Gabarito';
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const resultsContainer = document.getElementById('resultsContainer');
            const filteredQuestions = getFilteredQuestions();

            container.innerHTML = '';
            resultsContainer.innerHTML = '';
            resultsContainer.classList.remove('show');

            if (filteredQuestions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-title">Nenhuma questão encontrada</div>
                        <p>Ajuste os filtros para ver questões</p>
                    </div>
                `;
                return;
            }

            filteredQuestions.forEach((question, index) => {
                const html = renderQuestion(question, index);
                container.innerHTML += html;
            });

            // Add essay questions at the end
            const filteredEssays = essayQuestions.filter(q => {
                const lectureMatch = currentFilter.lecture === 'todas' || q.lecture === currentFilter.lecture;
                return lectureMatch;
            });

            if (filteredEssays.length > 0) {
                container.innerHTML += '<div style="margin-top: 40px; padding-top: 30px; border-top: 2px solid var(--border);"><h2 style="margin-bottom: 24px; font-size: 20px;">Questões Dissertativas</h2></div>';
                filteredEssays.forEach((question, index) => {
                    const html = renderEssayQuestion(question);
                    container.innerHTML += html;
                });
            }

            if (currentMode === 'simulado') {
                container.innerHTML += `<div style="text-align:center;margin-top:30px;"><button class="btn" style="padding:14px 40px;font-size:16px;" onclick="calculateResults()">Finalizar Simulado</button></div>`;
            }

            updateProgress(filteredQuestions);
        }

        function renderQuestion(question, index) {
            const isAnswered = userAnswers[question.id];
            const explanationHtml = isAnswered ? generateExplanation(question, userAnswers[question.id]) : '';
            const showExplanation = currentMode === 'estudo' && isAnswered;

            return `
                <div class="question-container fade-in" data-id="${question.id}">
                    <div class="question-number">Questão ${question.id}</div>
                    <div style="margin-bottom: 12px;">
                        <span class="difficulty-badge difficulty-${question.difficulty}">${question.difficulty.toUpperCase()}</span>
                        <span class="lecture-badge">${question.lecture.toUpperCase()}</span>
                    </div>
                    <p class="question-text">${question.text}</p>
                    <div class="alternatives">
                        ${question.alternatives.map(alt => {
                            const isSelected = userAnswers[question.id] === alt.letter;
                            const isCorrect = alt.letter === question.correct;
                            let className = 'alternative';
                            if (isSelected && isAnswered) {
                                className += isCorrect ? ' correct' : ' incorrect';
                            } else if (showExplanation && isCorrect) {
                                className += ' correct';
                            }

                            const disabled = isAnswered && currentMode === 'estudo' ? 'disabled' : '';

                            return `
                                <button class="${className}" onclick="selectAnswer(${question.id}, '${alt.letter}')" ${disabled}>
                                    <strong>${alt.letter})</strong> ${alt.text}
                                </button>
                            `;
                        }).join('')}
                    </div>
                    ${showExplanation ? `<div class="explanation show">${explanationHtml}</div>` : ''}
                </div>
            `;
        }

        function renderEssayQuestion(question) {
            const isAnswered = userAnswers[question.id];
            const hasAnswer = question.answer && question.answer.length > 0;

            return `
                <div class="essay-question fade-in">
                    <div class="question-number">Questão ${question.id}</div>
                    <span class="essay-badge">Dissertativa</span>
                    <p class="question-text">${question.text}</p>
                    <textarea class="essay-text-area" placeholder="Digite sua resposta aqui..." id="essay-${question.id}"></textarea>
                    ${currentMode === 'estudo' && hasAnswer ? `
                        <button class="btn-gabarito" onclick="toggleGabarito(${question.id})">Ver Gabarito</button>
                        <div class="essay-gabarito" id="gabarito-${question.id}">
                            <div class="essay-gabarito-title">Gabarito Esperado</div>
                            <div>${question.answer}</div>
                        </div>
                    ` : currentMode === 'estudo' ? '<p style="font-size: 12px; color: var(--text-secondary); margin-top: 8px;">Modo estudo: Escreva sua resposta e compare com o gabarito.</p>' : ''}
                </div>
            `;
        }

        function generateExplanation(question, selectedAnswer) {
            const isCorrect = selectedAnswer === question.correct;
            const correctAlt = question.alternatives.find(a => a.letter === question.correct);

            let html = '<div class="explanation-title">Explicação:</div>';

            if (isCorrect) {
                html += `<div class="explanation-correct">✓ Resposta Correta</div>`;
                html += `<div class="explanation-text">${question.explanation.correct}</div>`;
            } else {
                html += `<div class="explanation-wrong">✗ Resposta Incorreta</div>`;
                const selectedAlt = question.alternatives.find(a => a.letter === selectedAnswer);
                html += `<div class="explanation-text">Você marcou: <strong>${selectedAnswer})</strong> ${selectedAlt.text}</div>`;
                html += `<div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">`;
                html += `<div class="explanation-text"><strong>Por que ${selectedAnswer} está incorreto:</strong> ${question.explanation.wrong[selectedAnswer]}</div>`;
                html += `<div class="explanation-text"><strong>Resposta correta (${question.correct}):</strong> ${correctAlt.text}</div>`;
                html += `<div class="explanation-text">${question.explanation.correct}</div>`;
                html += '</div>';
            }

            html += `<div class="explanation-lecture">Referência: ${question.lecture.toUpperCase()}</div>`;

            return html;
        }

        function selectAnswer(questionId, letter) {
            userAnswers[questionId] = letter;
            if (currentMode === 'estudo') {
                renderQuestions();
            } else {
                const card = document.querySelector(`.question-container[data-id="${questionId}"]`);
                if (card) {
                    card.querySelectorAll('.alternative').forEach(btn => {
                        btn.classList.remove('selected');
                    });
                    card.querySelectorAll('.alternative').forEach(btn => {
                        if (btn.textContent.trim().startsWith(letter + ')')) {
                            btn.classList.add('selected');
                        }
                    });
                }
                updateProgress(getFilteredQuestions());
            }
        }

        function updateProgress(filteredQuestions) {
            const answered = filteredQuestions.filter(q => userAnswers[q.id]).length;
            const total = filteredQuestions.length;
            const percentage = total > 0 ? (answered / total) * 100 : 0;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${answered} de ${total}`;
        }

        function calculateResults() {
            const filteredQuestions = getFilteredQuestions();
            let correct = 0;

            filteredQuestions.forEach(q => {
                if (userAnswers[q.id] === q.correct) {
                    correct++;
                }
            });

            const percentage = filteredQuestions.length > 0 ? (correct / filteredQuestions.length) * 100 : 0;
            const score = Math.round(percentage);

            let message = '';
            if (score >= 80) {
                message = 'Excelente desempenho! Você está pronto para a prova.';
            } else if (score >= 60) {
                message = 'Bom desempenho! Continue estudando para melhorar.';
            } else if (score >= 40) {
                message = 'Desempenho regular. Revise os conteúdos com dificuldade.';
            } else {
                message = 'Desempenho abaixo do esperado. Estude novamente o material.';
            }

            const resultsHtml = `
                <div class="results-container show">
                    <div class="results-score">${score}%</div>
                    <div class="results-message">${message}</div>
                    <div class="results-detail">
                        <div class="result-stat">
                            <span>Acertos</span>
                            <strong>${correct}/${filteredQuestions.length}</strong>
                        </div>
                        <div class="result-stat">
                            <span>Erros</span>
                            <strong>${filteredQuestions.length - correct}/${filteredQuestions.length}</strong>
                        </div>
                        <div class="result-stat">
                            <span>Taxa de Acerto</span>
                            <strong>${score}%</strong>
                        </div>
                    </div>
                    <button class="btn" onclick="location.reload()">Tentar Novamente</button>
                </div>
            `;

            document.getElementById('questionsContainer').style.display = 'none';
            document.getElementById('resultsContainer').innerHTML = resultsHtml;
            document.getElementById('resultsContainer').classList.add('show');
        }

        // Initialize
        renderQuestions();
    </script>
</body>
</html>
